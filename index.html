<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timeline</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0b0a09;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* warm orange + subtle blue ambient glow */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:
        radial-gradient(circle at top left, rgba(255,140,0,0.22), transparent 45%),
        radial-gradient(circle at bottom right, rgba(70,160,255,0.14), transparent 50%),
        radial-gradient(circle at center, rgba(255,120,0,0.06), transparent 60%);
    pointer-events:none;
}

.phone{
    width:360px;
    max-width:95vw;
}

.card{
    background:linear-gradient(180deg, #1a120d, #120c09);
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 30px rgba(0,0,0,.7);
    border:1px solid rgba(255,140,0,0.25);
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#ff8a1f;
    letter-spacing:0.5px;
}

input, select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
    background:#1c1410;
    color:white;
    border:1px solid rgba(70,160,255,0.25);
}

input:focus, select:focus{
    border:1px solid #4da3ff;
    box-shadow:0 0 10px rgba(77,163,255,0.25);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4da3ff;
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    background:#3b8be6;
    transform:scale(1.02);
}

.hidden{
    display:none;
}

.date-card{
    background:linear-gradient(180deg, #20140f, #150e0a);
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;
    border-left:3px solid #ff8a1f;
    box-shadow:inset 0 0 10px rgba(255,140,0,0.05);
}

.label{
    font-size:14px;
    color:#ffb36b;
}

.number{
    font-size:28px;
    font-weight:bold;
    color:white;
}

.today{
    text-align:center;
    margin-bottom:15px;
}

.subtitle{
    color:#d0a48a;
    font-size:14px;
}

#percent{
    color:white;
    font-size:30px;
}
</style>

</head>

<body>

<div class="phone">

<div id="login" class="card">
    <h1>Timeline</h1>

    <input type="password" id="password" placeholder="Enter Password">

    <button onclick="checkPassword()">Unlock</button>
</div>

<div id="app" class="hidden card">

    <div class="today">
        <h1>Timeline</h1>
        <div id="todayDate" class="subtitle"></div>
    </div>

    <select id="unitSelect" onchange="updateUI()">
        <option value="days">Days</option>
        <option value="months">Months</option>
        <option value="years">Years</option>
        <option value="total">Total</option>
    </select>

    <div class="date-card">
        <div class="label">Time since we met</div>
        <div class="number" id="realization"></div>
    </div>

    <div class="date-card">
        <div class="label">Time since we first got together</div>
        <div class="number" id="dating1"></div>
    </div>

    <div class="date-card">
        <div class="label">Time since we've been on talking terms</div>
        <div class="number" id="talkingTerms"></div>
    </div>

    <div class="date-card">
        <div class="label">Time since we've been actually talking again</div>
        <div class="number" id="talkingAgain"></div>
    </div>

    <div class="date-card">
        <div class="label">Time since we first hung out again</div>
        <div class="number" id="firstHangoutAgain"></div>
    </div>

    <div class="date-card">
        <div class="label">Time since we've begun dating again</div>
        <div class="number" id="dating2"></div>
    </div>

    <div class="date-card">
        <div class="label">% of life with him</div>
        <div class="number" id="percent"></div>
    </div>

</div>

</div>

<script>

const PASSWORD = "SFEY5126";

const birthday = new Date("2007-04-05");
const realization = new Date("2022-08-23");
const dating1 = new Date("2023-01-24");
const talkingTerms = new Date("2025-04-24");
const talkingAgain = new Date("2025-12-23");
const firstHangoutAgain = new Date("2026-04-19");
const dating2 = new Date("2026-05-01");

function checkPassword(){

    const entered = document.getElementById("password").value;

    if(entered === PASSWORD){

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        startLiveUpdates();

    }else{

        alert("Incorrect password");

    }
}

function diffDays(start){

    const now = new Date();

    return (now - start) / (1000 * 60 * 60 * 24);

}

function breakdown(days){

    const years = Math.floor(days / 365.25);

    const months = Math.floor(
        (days % 365.25) / 30.436875
    );

    const remDays = Math.floor(
        days % 30.436875
    );

    return `${years}y ${months}m ${remDays}d`;

}

function format(value, unit){

    if(unit === "total"){
        return breakdown(value);
    }

    if(unit === "days"){
        return Math.floor(value) + " days";
    }

    if(unit === "months"){
        return Math.floor(value / 30.436875) + " months";
    }

    if(unit === "years"){
        return Math.floor(value / 365.25) + " years";
    }
}

function updateUI(){

    const mode =
        document.getElementById("unitSelect").value;

    document.getElementById("todayDate")
        .textContent =
        new Date().toLocaleDateString();

    const r = diffDays(realization);
    const d1 = diffDays(dating1);
    const tt = diffDays(talkingTerms);
    const ta = diffDays(talkingAgain);
    const fha = diffDays(firstHangoutAgain);
    const d2 = diffDays(dating2);

    document.getElementById("realization")
        .textContent = format(r, mode);

    document.getElementById("dating1")
        .textContent = format(d1, mode);

    document.getElementById("talkingTerms")
        .textContent = format(tt, mode);

    document.getElementById("talkingAgain")
        .textContent = format(ta, mode);

    document.getElementById("firstHangoutAgain")
        .textContent = format(fha, mode);

    document.getElementById("dating2")
        .textContent = format(d2, mode);

    const life = diffDays(birthday);
    const real = diffDays(realization);

    const percent =
        Math.floor((real / life) * 10000) / 100;

    document.getElementById("percent")
        .textContent = percent + "%";
}

function startLiveUpdates(){

    updateUI();

    setInterval(updateUI, 1000);

}

</script>

</body>
</html>
