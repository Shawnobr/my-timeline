<script>

const PASSWORD = "SFEY5126";

let currentValues = {
    birthday: 0,
    realization: 0,
    dating1: 0,
    dating2: 0
};

function checkPassword() {

    const entered = document.getElementById("password");

    if (!entered) return;

    if (entered.value === PASSWORD) {

        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        updateDates();

        // live update every second
        setInterval(updateDates, 1000);

    } else {
        alert("Incorrect password");
    }
}

function diffInDays(dateString){
    const start = new Date(dateString);
    const now = new Date();
    return (now - start) / (1000 * 60 * 60 * 24);
}

function getMode(){
    const el = document.getElementById("viewMode");
    return el ? el.value : "days";
}

function convert(days){

    const mode = getMode();

    switch(mode){
        case "months":
            return days / 30.436875;
        case "years":
            return days / 365.2425;
        default:
            return days;
    }
}

function animateValue(key, targetValue){

    const el = document.getElementById(key);
    if (!el) return;

    const startValue = currentValues[key] ?? 0;
    const diff = targetValue - startValue;

    const duration = 700;
    const startTime = performance.now();

    function frame(time){

        const progress = Math.min((time - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3);

        const value = startValue + diff * eased;

        el.textContent =
            (Math.round(value * 100) / 100).toFixed(2) +
            " " +
            getMode();

        if (progress < 1){
            requestAnimationFrame(frame);
        } else {
            currentValues[key] = targetValue;
        }
    }

    requestAnimationFrame(frame);
}

function updateDates(){

    const todayEl = document.getElementById("todayDate");
    if (todayEl){
        todayEl.textContent = new Date().toLocaleDateString();
    }

    animateValue("birthday", convert(diffInDays("2007-04-05")));
    animateValue("realization", convert(diffInDays("2022-10-10")));
    animateValue("dating1", convert(diffInDays("2023-01-24")));
    animateValue("dating2", convert(diffInDays("2026-05-01")));
}

// SAFE INIT (prevents white screen crashes)
document.addEventListener("DOMContentLoaded", () => {

    const mode = document.getElementById("viewMode");
    if (mode){
        mode.addEventListener("change", updateDates);
    }

});

</script>
