<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0f0f12;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

/* subtle warm glow background */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background: radial-gradient(circle at top left, rgba(255,140,0,0.15), transparent 40%),
                radial-gradient(circle at bottom right, rgba(0,140,255,0.12), transparent 45%);
    pointer-events:none;
}

.phone{
    width:360px;
    max-width:95vw;
}

.card{
    background:#18181d;
    border-radius:20px;
    padding:20px;
    box-shadow:0 0 25px rgba(0,0,0,.6);
    border:1px solid rgba(255,140,0,0.15);
}

h1{
    text-align:center;
    margin-bottom:10px;
    color:#ff9a2f; /* orange */
    letter-spacing:0.5px;
}

input, select{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    margin-bottom:10px;
    background:#23232a;
    color:white;
    outline:none;
    border:1px solid rgba(0,140,255,0.2);
}

input:focus, select:focus{
    border:1px solid #4da3ff;
    box-shadow:0 0 8px rgba(77,163,255,0.3);
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:10px;
    background:#4da3ff; /* blue accent */
    color:white;
    cursor:pointer;
    font-size:16px;
    transition:0.2s;
}

button:hover{
    background:#3b8be6;
    transform:scale(1.02);
}

.hidden{ display:none; }

.date-card{
    background:#1f1f26;
    border-radius:15px;
    padding:15px;
    margin-bottom:12px;
    border-left:3px solid #ff9a2f; /* orange highlight */
}

.label{
    font-size:14px;
    color:#ffb36b; /* soft orange */
}

.number{
    font-size:28px;
    font-weight:bold;
    color:#ffffff;
}

.today{
    text-align:center;
    margin-bottom:15px;
}

.subtitle{
    color:#999;
    font-size:14px;
}

/* % card highlight */
#percent{
    color:#4da3ff; /* blue emphasis */
    font-size:30px;
}
</style>
