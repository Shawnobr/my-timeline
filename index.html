<script>

const PASSWORD = "SFEY5126";

const birthday = new Date("2007-04-05");
const realization = new Date("2022-10-10");
const dating1 = new Date("2023-01-24");
const dating2 = new Date("2026-05-01");

function checkPassword(){
    const entered = document.getElementById("password").value;

    if(entered === PASSWORD){
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        startLiveUpdates();
    } else {
        alert("Incorrect password");
    }
}

// total days difference (floor only)
function getDays(start){
    const now = new Date();
    return Math.floor((now - start) / (1000 * 60 * 60 * 24));
}

// breakdown helper
function breakdown(days){
    const years = Math.floor(days / 365.25);
    const months = Math.floor((days % 365.25) / 30.436875);
    const remDays = Math.floor(days % 30.436875);

    return { years, months, days: remDays };
}

function formatTotal(days, mode){

    if(mode === "years"){
        const b = breakdown(days);
        return `${b.years}y ${b.months}m ${b.days}d`;
    }

    if(mode === "months"){
        const totalMonths = Math.floor(days / 30.436875);
        const remDays = Math.floor(days % 30.436875);
        return `${totalMonths}m ${remDays}d`;
    }

    // default: days mode
    return `${Math.floor(days)} days`;
}

function updateUI(){

    const mode = document.getElementById("unitSelect").value;

    document.getElementById("todayDate")
        .textContent = new Date().toLocaleDateString();

    const rDays = getDays(realization);
    const d1Days = getDays(dating1);
    const d2Days = getDays(dating2);

    document.getElementById("realization")
        .textContent = formatTotal(rDays, mode);

    document.getElementById("dating1")
        .textContent = formatTotal(d1Days, mode);

    document.getElementById("dating2")
        .textContent = formatTotal(d2Days, mode);

    // % realization of life (always accurate, no rounding up)
    const lifeDays = getDays(birthday);
    const realizationDays = getDays(realization);

    const percent = Math.floor((realizationDays / lifeDays) * 10000) / 100;

    document.getElementById("percent")
        .textContent = percent + "%";
}

function startLiveUpdates(){
    updateUI();
    setInterval(updateUI, 1000);
}

</script>
