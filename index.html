<script>

const PASSWORD = "SFEY5126";

// store last displayed values so animation can start from current state
let currentValues = {
    birthday: 0,
    realization: 0,
    dating1: 0,
    dating2: 0
};

function checkPassword() {

    const entered = document.getElementById("password").value;

    if (entered === PASSWORD) {
        document.getElementById("login").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");

        updateDates();

        // live refresh every second
        setInterval(updateDates, 1000);

    } else {
        alert("Incorrect password");
    }
}

// raw difference in days
function diffInDays(dateString){
    const start = new Date(dateString);
    const now = new Date();
    return (now - start) / (1000 * 60 * 60 * 24);
}

function convert(days){
    const mode = document.getElementById("viewMode").value;

    if (mode === "days") return days;
    if (mode === "months") return days / 30.436875;
    if (mode === "years") return days / 365.2425;
}

function animateValue(key, newValue){

    const el = document.getElementById(key);

    const startValue = currentValues[key] || 0;
    const change = newValue - startValue;

    const duration = 500; // ms
    const startTime = performance.now();

    function animate(time){

        const progress = Math.min((time - startTime) / duration, 1);
        const eased = 1 - Math.pow(1 - progress, 3); // smooth ease-out

        const value = startValue + change * eased;

        el.textContent =
            (Math.round(value * 100) / 100).toFixed(2) +
            " " +
            document.getElementById("viewMode").value;

        if (progress < 1){
            requestAnimationFrame(animate);
        } else {
            currentValues[key] = newValue;
        }
    }

    requestAnimationFrame(animate);
}

function updateDates(){

    const today = new Date();
    document.getElementById("todayDate").textContent =
        today.toLocaleDateString();

    animateValue("birthday", convert(diffInDays("2007-04-05")));
    animateValue("realization", convert(diffInDays("2022-10-10")));
    animateValue("dating1", convert(diffInDays("2023-01-24")));
    animateValue("dating2", convert(diffInDays("2026-05-01")));
}

// re-animate when switching modes
document.addEventListener("DOMContentLoaded", () => {
    const mode = document.getElementById("viewMode");
    if (mode) mode.addEventListener("change", updateDates);
});

</script>
